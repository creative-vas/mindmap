<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindMap — Freelance & Projects Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="url(#g1)" stroke-width="2"/>
          <circle cx="14" cy="14" r="4" fill="url(#g1)"/>
          <circle cx="6" cy="8" r="2.5" fill="#6C63FF"/>
          <circle cx="22" cy="8" r="2.5" fill="#FF6584"/>
          <circle cx="14" cy="24" r="2.5" fill="#00C9A7"/>
          <line x1="14" y1="10" x2="8" y2="9" stroke="#6C63FF" stroke-width="1.5" opacity="0.5"/>
          <line x1="14" y1="10" x2="20" y2="9" stroke="#FF6584" stroke-width="1.5" opacity="0.5"/>
          <line x1="14" y1="18" x2="14" y2="22" stroke="#00C9A7" stroke-width="1.5" opacity="0.5"/>
          <defs><linearGradient id="g1" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6C63FF"/><stop offset="1" stop-color="#FF6584"/></linearGradient></defs>
        </svg>
        <span>MindMap</span>
      </div>
      <div class="topbar-actions">
        <button id="btnAddCategory" class="btn btn-ghost" title="Add Category">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Category
        </button>
        <button id="btnZoomFit" class="btn btn-ghost" title="Fit to view">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 6V1h5M10 1h5v5M15 10v5h-5M6 15H1v-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Fit
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <span class="save-status" id="saveStatus">Saved</span>
    </div>
  </header>

  <!-- Canvas -->
  <div id="canvasWrapper">
    <canvas id="mindmapCanvas"></canvas>
  </div>

  <!-- Context menu -->
  <div id="contextMenu" class="context-menu hidden">
    <button data-action="add-child">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Add Child
    </button>
    <button data-action="generate-image">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><circle cx="5" cy="5" r="1.5" fill="currentColor"/><path d="M1 10l3-3 2 2 3-4 4 5" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
      Generate Image
    </button>
    <button data-action="edit-label">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M10 1.5l2.5 2.5L5 11.5H2.5V9L10 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      Edit Label
    </button>
    <button data-action="change-color">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/><circle cx="7" cy="7" r="3" fill="currentColor" opacity="0.4"/></svg>
      Change Color
    </button>
    <div class="context-divider"></div>
    <button data-action="delete" class="danger">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M3.5 4l.5 8.5h6l.5-8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Delete
    </button>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="modalTitle">Add Node</h3>
      <input type="text" id="modalInput" placeholder="Enter label..." autocomplete="off" />
      <div id="colorPicker" class="color-picker hidden">
        <div class="color-swatch" data-color="#6C63FF" style="background:#6C63FF"></div>
        <div class="color-swatch" data-color="#FF6584" style="background:#FF6584"></div>
        <div class="color-swatch" data-color="#00C9A7" style="background:#00C9A7"></div>
        <div class="color-swatch" data-color="#FFC75F" style="background:#FFC75F"></div>
        <div class="color-swatch" data-color="#845EC2" style="background:#845EC2"></div>
        <div class="color-swatch" data-color="#FF9671" style="background:#FF9671"></div>
        <div class="color-swatch" data-color="#00D2FC" style="background:#00D2FC"></div>
        <div class="color-swatch" data-color="#F9F871" style="background:#F9F871"></div>
      </div>
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-ghost">Cancel</button>
        <button id="modalOk" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Loading overlay for image generation -->
  <div id="imageGenOverlay" class="image-gen-overlay hidden">
    <div class="image-gen-card">
      <div class="spinner"></div>
      <p>Generating illustration with Gemini...</p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
